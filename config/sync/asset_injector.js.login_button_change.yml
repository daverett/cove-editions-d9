id: login_button_change
label: 'Login button change'
code: |-
  (function (Drupal, once) {
    Drupal.behaviors.coveLoginButtonText = {
      attach(context) {
        once(
          'cove-login-text',
          'input[data-drupal-selector="edit-openid-connect-client-navsa-login"]',
          context
        ).forEach((btn) => {
          btn.value = 'Log in';
        });
      }
    };
  })(Drupal, once);

        description: 'This set of fields is intended to store historical dates and to accommodate the display of dates that are "fuzzy" or uncertain in some way. If the exact date is known, just enter the date in the Event Date field. If an exact date is uncertain or cannot be determined to an exact day, please do your best to approximate the date in the datepicker. For example, if an event is only known to have occurred in June 1876, enter 1876/06/01 in the datepicker. In this text field, you can enter "June 1876" or even "circa. June 1876" as an approximation.'

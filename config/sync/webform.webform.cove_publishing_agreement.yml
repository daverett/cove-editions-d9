ion-thickness:initial;text-indent:0px;text-transform:none;vertical-align:baseline;white-space:normal;widows:2;word-spacing:0px;">You will retain copyright following Creative Commons 3.0 licensing protocols. You will have the responsibility to use Public Domain images in your work and to ensure proper credit is given for all images and citations.</p><p style="-webkit-text-stroke-width:0px;border:0px;color:rgb(0, 0, 0);font-family:&quot;Open Sans&quot;, &quot;Segoe UI&quot;, Helvetica, sans-serif;font-size:13px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin:0px 0px 20px;orphans:2;padding:0px;text-align:start;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;vertical-align:baseline;white-space:normal;widows:2;word-spacing:0px;"><em style="border:0px;margin:0px;padding:0px;vertical-align:baseline;"><strong style="border:0px;font-family:Arial, Helvetica, sans-serif !important;font-weight:bold !important;margin:0px;padding:0px;vertical-align:baseline;">A note for teachers:&nbsp;</strong>If you are creating a private group and registering students yourself, you''ll need to find out from students prior to registering them&nbsp;whether they ''agree'' or ''disagree''&nbsp;and fill out this form each time you register&nbsp;a student.</em></p>'
  yes_or_no2:
    '#type': radios
    '#title': 'Make my work public?'
    '#title_display': invisible
    '#options':
      'I agree': 'I agree'
      'I disagree': 'I disagree'
